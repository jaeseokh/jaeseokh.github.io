project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - research/*.qmd
    - resume/*.qmd

website:
  title: "Jaeseok Hwang"
  search: true
  repo-url: https://github.com/jaeseokh/jaeseokh.github.io
  page-footer:
    center: "Built with Quarto for research, defense, and recruiter review"
  navbar:
    right:
      - text: Research Atlas
        href: research/index.html
      - text: Spatial Decision Lab
        href: research/working_papers.html
      - text: Resume
        href: resume/index.html

format:
  html:
    theme: cosmo
    toc: false
    css: assets/styles.css
    code-link: true
    smooth-scroll: true

# freeze HTML so unchanged pages don’t rebuild every time
freeze: auto

# make /assets available to subprojects during render
resources:
  - assets
